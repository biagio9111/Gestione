<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Cantiere</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="screenLogin" class="screen active">
  <div class="login-box">
    <h1>🏗️ GESTIONE CANTIERE</h1>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="btnLogin">ACCEDI</button>
    <p id="loginErrore"></p>
  </div>
</section>

<section id="screenHome" class="screen">
  <header>
    <h2>🏗️ Gestione Cantiere</h2>
    <button id="btnLogout">Esci</button>
  </header>

  <div class="menu">
    <button onclick="showScreen('screenOperai')">👷<br>OPERAI</button>
    <button onclick="showScreen('screenFurgoni')">🚐<br>FURGONI</button>
    <button onclick="showScreen('screenPresenze')">📋<br>PRESENZE</button>
    <button onclick="showScreen('screenStorico')">📅<br>STORICO</button>
    <button onclick="showScreen('screenCosti')" class="wide">💰 RIEPILOGO COSTI</button>
  </div>

  <p id="dataOggi"></p>
</section>

<section id="screenOperai" class="screen">
  <header>
    <button onclick="showScreen('screenHome')">←</button>
    <h2>👷 Operai</h2>
  </header>

  <input id="cercaOperaio" placeholder="🔍 Cerca operaio">

  <div class="box">
    <input id="opNome" placeholder="Nome operaio">
    <input id="opRuolo" placeholder="Ruolo">
    <input id="opTelefono" placeholder="Telefono">
    <input id="opPaga" type="number" placeholder="Paga €/h">
    <input id="opTrasferta" type="number" placeholder="Trasferta €">
    <button id="btnSalvaOperaio">💾 SALVA OPERAIO</button>
  </div>

  <div id="listaOperai"></div>
</section>

<section id="screenFurgoni" class="screen">
  <header>
    <button onclick="showScreen('screenHome')">←</button>
    <h2>🚐 Furgoni</h2>
  </header>

  <div class="box">
    <input id="furModello" placeholder="Modello furgone">
    <input id="furTarga" placeholder="Targa">
    <button id="btnSalvaFurgone">+ AGGIUNGI FURGONE</button>
  </div>

  <div id="listaFurgoni"></div>
</section>

<section id="screenPresenze" class="screen">
  <header>
    <button onclick="showScreen('screenHome')">←</button>
    <h2>📋 Presenze oggi</h2>
  </header>

  <div class="box">
    <select id="presOperaio"></select>

    <select id="presStato">
      <option value="Presente">Presente</option>
      <option value="Assente">Assente</option>
      <option value="Malattia">Malattia</option>
      <option value="Ferie">Ferie</option>
    </select>

    <input id="presCantiere" placeholder="Cantiere">
    <select id="presFurgone"></select>
    <select id="presAutista"></select>

    <label>Check-in</label>
    <input id="presIn" type="time">

    <label>Check-out</label>
    <input id="presOut" type="time">

    <label>
      <input id="presTrasferta" type="checkbox">
      Trasferta
    </label>

    <input id="presDal" type="date">
    <input id="presAl" type="date">
    <input id="presMotivo" placeholder="Motivo">

    <button id="btnSalvaPresenza">💾 SALVA PRESENZA</button>
  </div>

  <div id="listaPresenzeOggi"></div>
</section>

<section id="screenStorico" class="screen">
  <header>
    <button onclick="showScreen('screenHome')">←</button>
    <h2>📅 Storico</h2>
  </header>

  <input id="storicoData" type="date">
  <button id="btnCaricaStorico">CARICA</button>

  <div id="listaStorico"></div>
</section>

<section id="screenCosti" class="screen">
  <header>
    <button onclick="showScreen('screenHome')">←</button>
    <h2>💰 Riepilogo costi</h2>
  </header>

  <label>Dal</label>
  <input id="costiDal" type="date">

  <label>Al</label>
  <input id="costiAl" type="date">

  <button id="btnCalcolaCosti">🔍 CALCOLA</button>

  <div id="listaCosti"></div>
  <h2 id="totaleCosti">Totale: €0.00</h2>
</section>

<script type="module" src="app.js"></script>
</body>
</html>
